<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#bdb2a3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Window frame -->
  <rect x="4" y="10" width="56" height="44" rx="3" stroke-width="2" fill="black"/>
  <!-- Title bar separator -->
  <line x1="4" y1="20" x2="60" y2="20" stroke-width="1.5"/>
  <!-- Traffic lights -->
  <circle cx="13" cy="15" r="2.5" stroke-width="1.5"/>
  <circle cx="22" cy="15" r="2.5" stroke-width="1.5"/>
  <circle cx="31" cy="15" r="2.5" stroke-width="1.5"/>
  <!-- Prompt: > -->
  <polyline points="12,33 19,38 12,43" stroke-width="2"/>
  <!-- Cursor block -->
  <rect x="23" y="33" width="8" height="10" fill="#bdb2a3" stroke="none"/>
</svg>
